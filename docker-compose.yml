services:
  postgres:
    image: postgres:16-alpine
    container_name: git_recruitment_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gituser
      POSTGRES_PASSWORD: gitpass
      POSTGRES_DB: git_recruitment
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gituser -d git_recruitment"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: git_recruitment_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://gituser:gitpass@postgres:5432/git_recruitment
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: